name: OpenRouter PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      model:
        description: OpenRouter model id
        required: false
        default: deepseek/deepseek-v4-flash
        type: string
      pull_request_number:
        description: PR number to review
        required: true
        type: number
      prompt:
        description: Optional extra review instructions
        required: false
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Review pull request
        uses: ./
        with:
          open-router-api-key: ${{ secrets.OPEN_ROUTER_API_KEY }}
          model: ${{ github.event_name == 'workflow_dispatch' && inputs.model || vars.OPENROUTER_MODEL || '' }}
          prompt: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt || '' }}
          pull-request-number: ${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || '' }}
