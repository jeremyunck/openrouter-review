name: OpenRouter Docs Update

# After a pull request is merged, send its diff plus the current contents of the
# configured documentation files to OpenRouter and ask for updated documentation
# that reflects the change. Any updates are proposed back as a new pull request.
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      doc_files:
        description: Documentation files to update (JSON array, comma-separated, or newline list)
        required: true
        type: string
      model:
        description: OpenRouter model id
        required: false
        default: deepseek/deepseek-v4-flash
        type: string
      fallback_model:
        description: OpenRouter model id to use if the primary model fails
        required: false
        default: ''
        type: string
      prompt:
        description: Optional extra documentation instructions / prompt customizations
        required: false
        type: string
      pull_request_number:
        description: Merged PR number to base the documentation update on
        required: true
        type: number

jobs:
  update-docs:
    # Only run for merged PRs, or for manual dispatches.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out the documentation target branch
        uses: actions/checkout@v4
        with:
          # On a merged PR, update docs on the branch it merged into; otherwise
          # the dispatch runs against the ref it was triggered on.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate documentation updates
        id: docs
        env:
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          DOC_FILES: ${{ github.event_name == 'workflow_dispatch' && inputs.doc_files || vars.OPENROUTER_DOC_FILES }}
          MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.model || vars.OPENROUTER_MODEL || '' }}
          FALLBACK_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.fallback_model || vars.OPENROUTER_FALLBACK_MODEL || '' }}
          PROMPT: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt || vars.OPENROUTER_DOCS_PROMPT || '' }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || github.event.pull_request.number }}
        run: node src/docs-update.js

      - name: Open a pull request with the documentation updates
        if: steps.docs.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: docs/openrouter-update-pr-${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || github.event.pull_request.number }}
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          commit-message: "docs: update documentation for PR #${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || github.event.pull_request.number }}"
          title: "docs: update documentation for PR #${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || github.event.pull_request.number }}"
          body: |
            Automated documentation update generated by OpenRouter after merging
            #${{ github.event_name == 'workflow_dispatch' && inputs.pull_request_number || github.event.pull_request.number }}.

            Updated files:
            ${{ steps.docs.outputs.updated-files }}

            Please review the proposed changes for accuracy before merging.
          delete-branch: true
